  /* Vignette fade on sides */
  .bg-vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(to right, rgba(8,12,16,0.92) 0%, transparent 18%, transparent 82%, rgba(8,12,16,0.92) 100%),
      linear-gradient(to bottom, rgba(8,12,16,0.6) 0%, transparent 25%, transparent 75%, rgba(8,12,16,0.85) 100%);
    pointer-events: none;
  }

  /* ── LAYOUT ── */

  .sc {

  /* ── FORM CARD ── */

  .field { display: flex; flex-direction: column; gap: 7px; }

  .field input, .field select {

  .btn-add {

<body>

<div class="bg-image" id="bgImage"></div>
<div class="bg-vignette"></div>
<div class="bg-glow"></div>


<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-tag">Финансовый трекер</div>
    <h1>МОИ<span>ВЫПЛАТЫ</span></h1>
    <p>Добавляй записи — всё считается автоматически</p>
  </div>

  <!-- Summary -->
  <div class="summary-grid">
    <div class="sc sc-main">
      <div class="sc-label">Итого получено</div>
      <div class="sc-value" id="totalAmount">0 ₽</div>
    </div>
    <div class="sc sc-count">
      <div class="sc-label">Записей</div>
      <div class="sc-value" id="totalCount">0</div>
    </div>

  </div>

  <!-- Form -->
  <div class="form-card">
    <div class="section-title">Начислено</div>
    <div class="form-row">
      <div class="field">
        <label>Описание</label>
        <input type="text" id="inputDesc" placeholder="Зарплата, аванс…" maxlength="40">
      </div>
      <div class="field">
        <label>Сумма (₽)</label>
        <input type="number" id="inputAmount" placeholder="50 000" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Дата</label>
        <input type="date" id="inputDate">
      </div>
      <button class="btn-add" onclick="addRecord()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 2v10M2 7h10" stroke="#080c10" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        Добавить
      </button>
    </div>
  </div>

  <!-- Records -->
  <div class="records-card">
    <div class="records-header">
      <div class="filter-pills">
        <button class="pill active" onclick="setFilter('all',this)">Все</button>
        <button class="pill" onclick="setFilter('month',this)">Месяц</button>
        <button class="pill" onclick="setFilter('year',this)">Год</button>
      </div>
      <div class="btn-actions">
        <button class="btn-export" onclick="exportCSV()">📋 Экспорт</button>
        <button class="btn-clear" onclick="clearAll()">Очистить</button>
      </div>
    </div>
    <div id="recordsList"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-line" id="toastLine"></div>
  <span id="toastMsg">OK</span>
</div>

<!-- Export Modal (fallback) -->
<div class="modal-overlay" id="exportModal">
  <div class="modal-box" style="width:min(360px,92vw)">
    <div class="modal-title">Твои выплаты</div>
    <div class="modal-desc">Нажми «Копировать» — потом вставь куда нужно</div>
    <textarea id="exportText" readonly style="width:100%;height:180px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#e8ecf0;font-size:12px;padding:10px;resize:none;font-family:monospace;margin-bottom:16px;box-sizing:border-box;"></textarea>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="document.getElementById('exportModal').classList.remove('show')">Закрыть</button>
      <button class="modal-btn-confirm" style="background:rgba(45,212,191,0.15);border-color:rgba(45,212,191,0.4);color:#2dd4bf;" onclick="copyExport()">Копировать</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title">Удалить всё?</div>
    <div class="modal-desc">Все записи будут удалены.<br>Это действие нельзя отменить.</div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="modal-btn-confirm" onclick="confirmClear()">Удалить</button>
    </div>
  </div>
</div>

<script>
// background set via CSS


const KEY = 'salary_v3';
let records = [];
let filter  = 'all';

function load() {
  try { records = JSON.parse(localStorage.getItem(KEY)) || []; } catch { records = []; }
}
function save() { localStorage.setItem(KEY, JSON.stringify(records)); }

const MONTHS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
function fmtDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${parseInt(d)} ${MONTHS[parseInt(m)-1]} ${y}`;
}
function fmtMoney(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + ' млн ₽';
  return n.toLocaleString('ru-RU') + ' ₽';
}

function bump(id) {
  const el = document.getElementById(id);
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
}

function filtered() {
  const now = new Date();
  return records.filter(r => {
    if (filter === 'month') { const d=new Date(r.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); }
    if (filter === 'year')  { const d=new Date(r.date); return d.getFullYear()===now.getFullYear(); }
    return true;
  });
}

function updateSummary() {
  const f = filtered();
  const total = f.reduce((s,r)=>s+r.amount, 0);
  document.getElementById('totalAmount').textContent = fmtMoney(total);
  document.getElementById('totalCount').textContent  = f.length;
  bump('totalAmount'); bump('totalCount');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  const list = document.getElementById('recordsList');
  const f = filtered().slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (!f.length) {
    list.innerHTML = `<div class="empty-state"><span class="ei">📋</span><p>Нет записей<br><span>Добавь первую выплату выше</span></p></div>`;
    return;
  }
  list.innerHTML = f.map((r,i) => `
    <div class="record-item">
      <div class="record-num">${f.length - i}</div>
      <div class="record-info">
        <div class="record-desc">${esc(r.desc||'Выплата')}</div>
        <div class="record-date">${fmtDate(r.date)}</div>
      </div>
      <div class="record-amount">+${fmtMoney(r.amount)}</div>
      <button class="btn-del" onclick="del('${r.id}')" title="Удалить">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>`).join('');
}

function addRecord() {
  const desc   = document.getElementById('inputDesc').value.trim() || 'Выплата';
  const amount = parseFloat(document.getElementById('inputAmount').value);
  const date   = document.getElementById('inputDate').value;
  if (!amount || amount <= 0) { toast('⚠ Введи сумму','err'); return; }
  if (!date)                  { toast('⚠ Укажи дату','err'); return; }
  records.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,5), desc, amount, date });
  save(); render(); updateSummary();
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputDesc').value   = '';
  toast('Выплата добавлена','ok');
}

function del(id) {
  records = records.filter(r=>r.id!==id);
  save(); render(); updateSummary();
  toast('Запись удалена','err');
}

function clearAll() {
  if (!records.length) { toast('Нет записей','err'); return; }
  document.getElementById('confirmModal').classList.add('show');
}

function closeModal() {
  document.getElementById('confirmModal').classList.remove('show');
}

function confirmClear() {
  closeModal();
  records = []; save(); render(); updateSummary();
  toast('История очищена','err');
}

function exportCSV() {
  const f = filtered().slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (!f.length) { toast('Нет данных','err'); return; }

  const total = f.reduce((s,r)=>s+r.amount,0);
  const lines = f.map(r=>`${fmtDate(r.date)}  ${r.desc}: +${fmtMoney(r.amount)}`);
  const text = `МОИ ВЫПЛАТЫ\n${'─'.repeat(26)}\n${lines.join('\n')}\n${'─'.repeat(26)}\nИТОГО: ${fmtMoney(total)}`;

  document.getElementById('exportText').value = text;
  document.getElementById('exportModal').classList.add('show');
}

function copyExport() {
  const ta = document.getElementById('exportText');
  // iOS-compatible copy
  ta.contentEditable = true;
  ta.readOnly = false;
  const range = document.createRange();
  range.selectNodeContents(ta);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  ta.setSelectionRange(0, 99999);
  try {
    document.execCommand('copy');
    toast('Скопировано ✓','ok');
  } catch(e) {
    toast('Выдели текст и скопируй вручную','err');
  }
  ta.contentEditable = false;
  ta.readOnly = true;
  sel.removeAllRanges();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(); updateSummary();
}

let toastT;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  const ln = document.getElementById('toastLine');
  document.getElementById('toastMsg').textContent = msg;
  ln.className = 'toast-line ' + type;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>el.classList.remove('show'), 2600);
}

document.getElementById('inputDate').valueAsDate = new Date();
document.addEventListener('keydown', e => {
  if (e.key==='Enter' && ['inputDesc','inputAmount','inputDate'].includes(e.target.id)) addRecord();
});

load(); render(); updateSummary();

</script>
